databases:
  - name: business-dashboard-db
    plan: free
    databaseName: dashboard
    user: dashboard

services:
  - type: web
    name: business-dashboard-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -e ".[dev]"
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: business-dashboard-db
          property: connectionString
      - key: ATTENTION_THRESHOLD_DAYS
        value: 30
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0

  - type: web
    name: business-dashboard-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
