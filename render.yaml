databases:
  - name: business-dashboard-db
    plan: free
    databaseName: dashboard
    user: dashboard

services:
  - type: web
    name: business-dashboard-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: business-dashboard-db
          property: connectionString
      - key: ATTENTION_THRESHOLD_DAYS
        value: 30
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: business-dashboard-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
